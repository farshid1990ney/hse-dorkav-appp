<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>SDS | برگه‌ی داده‌های ایمنی مواد</title>
  <style>
    :root {
      --primary: #ff6208;
      --primary-hover: #e05300;
      --success: #27ae60;
      --danger: #c0392b;
      --dark-blue: #1e3c5c;
      --bg-gradient: linear-gradient(145deg, #eef2f7 0%, #dfe7f0 100%);
      --card-bg: #ffffff;
      --text-main: #1e2a2e;
      --text-muted: #64748b;
      --border-radius-lg: 24px;
      --border-radius-md: 16px;
      --border-radius-sm: 12px;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.06);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }

    body {
      background: var(--bg-gradient);
      padding: 15px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: var(--text-main);
      line-height: 1.8;
    }

    .main-container {
      max-width: 980px;
      width: 100%;
      background: var(--card-bg);
      border-radius: var(--border-radius-lg);
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .header {
      background: var(--dark-blue);
      padding: 30px 20px;
      color: white;
      text-align: center;
      border-bottom: 4px solid var(--primary);
      position: relative;
    }
    .header h1 { font-size: 1.65rem; margin-bottom: 4px; }
    .header p { opacity: 0.86; font-size: 0.9rem; }
    .back-home {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.15);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      transition: var(--transition);
    }
    .back-home:hover { background: rgba(255,255,255,0.28); }

    .content { padding: 22px; }
    .card {
      background: var(--card-bg);
      border-radius: var(--border-radius-md);
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.05);
    }
    .card-title {
      color: var(--dark-blue);
      font-size: 1.08rem;
      font-weight: bold;
      border-right: 4px solid var(--primary);
      padding-right: 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }
    .search-input {
      width: 100%;
      padding: 12px 14px;
      border-radius: var(--border-radius-sm);
      border: 2px solid rgba(30,60,92,0.18);
      background: #f8fafc;
      color: var(--text-main);
      font-size: 1rem;
      outline: none;
      transition: var(--transition);
    }
    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255,98,8,0.15);
      background: #fff;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: var(--border-radius-sm);
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      text-decoration: none;
      min-height: 42px;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 14px rgba(0,0,0,0.08); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); color: white; }
    .btn-secondary { background: #e2e8f0; color: #334155; }

    .note {
      background: #f1f6fa;
      border-right: 4px solid #2563eb;
      color: var(--text-muted);
      border-radius: var(--border-radius-sm);
      padding: 12px 14px;
      margin-top: 12px;
      font-size: 0.9rem;
    }
    .note strong { color: var(--dark-blue); }

    .file-list { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 14px; }
    .file-card {
      background: #fff;
      border-radius: var(--border-radius-md);
      border: 1px solid rgba(30,60,92,0.08);
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      box-shadow: 0 6px 18px rgba(0,0,0,0.045);
    }
    .file-name {
      font-size: 1rem;
      font-weight: 800;
      color: var(--dark-blue);
      overflow-wrap: anywhere;
    }
    .file-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 24px 12px;
      background: #f8fafc;
      border-radius: var(--border-radius-md);
      border: 1px dashed rgba(30,60,92,0.25);
      margin-top: 14px;
    }

    .footer {
      background: rgba(0,0,0,0.02);
      padding: 14px 20px;
      text-align: center;
      font-size: 0.88rem;
      color: var(--text-muted);
      border-top: 1px solid rgba(0,0,0,0.05);
    }
    .footer .highlight { color: var(--primary); font-weight: bold; }

    input[type="file"] { display: none; }

    @media(max-width: 760px) {
      .toolbar { grid-template-columns: 1fr; }
      .file-card { grid-template-columns: 1fr; }
      .file-actions { justify-content: stretch; }
      .file-actions .btn { flex: 1 1 130px; }
    }
    @media(max-width: 520px) {
      body { padding: 10px; }
      .content { padding: 14px; }
      .header h1 { font-size: 1.25rem; }
      .back-home { width: 36px; height: 36px; left: 10px; }
      .btn { width: 100%; }
      .file-actions .btn { flex-basis: 100%; }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <div class="header">
      <a href="../index.html" class="back-home" title="بازگشت به صفحه اصلی">🏠</a>
      <h1>📄 SDS</h1>
      <p>برگه‌ی داده‌های ایمنی مواد</p>
    </div>

    <div class="content">
      <div class="card">
        <div class="card-title">🔎 جستجوی مواد</div>
        <div class="toolbar">
          <input id="searchInput" class="search-input" type="search" placeholder="نام ماده یا کد را جستجو کنید..." autocomplete="off">
        </div>
        <div class="note">
          <strong>راهنما:</strong> برای مشاهده‌ی کامل اطلاعات ایمنی هر ماده، روی دکمه‌ی «باز کردن» بزنید.
        </div>
      </div>

      <div class="card">
        <div class="card-title">📚 فهرست برگه‌های ایمنی</div>
        <div id="fileList" class="file-list"></div>
        <div id="emptyState" class="empty-state" style="display:none;">ماده‌ای با این عبارت پیدا نشد.</div>
      </div>
    </div>

    <div class="footer">
      تهیه شده توسط <span class="highlight">مهندس فرشید نگهداری - مهندس حسین زارعی</span>
    </div>
  </div>

  <script>
    const DEFAULT_SDS_FILES = [
  {
    "id": 1,
    "title": "کفساز - 65IRO",
    "filename": "65IRO کفساز.pdf",
    "type": "default"
  },
  {
    "id": 2,
    "title": "C 4DTC کولکتور",
    "filename": "C 4DTC کو.pdf",
    "type": "default"
  },
  {
    "id": 3,
    "title": "فروتر MIBC",
    "filename": "MIBC F.pdf",
    "type": "default"
  },
  {
    "id": 4,
    "title": "بنزین",
    "filename": "بنزین.pdf",
    "type": "default"
  },
  {
    "id": 5,
    "title": "روغن کاج",
    "filename": "روغن کاج) .pdf",
    "type": "default"
  },
  {
    "id": 6,
    "title": "روی",
    "filename": "روی.pdf",
    "type": "default"
  },
  {
    "id": 7,
    "title": "سدیم اتیل زانتات",
    "filename": "سدیم اتیل زانتات.pdf",
    "type": "default"
  },
  {
    "id": 8,
    "title": "سرب",
    "filename": "سرب.pdf",
    "type": "default"
  },
  {
    "id": 9,
    "title": "سولفات روی",
    "filename": "سولفات روی.pdf",
    "type": "default"
  },
  {
    "id": 10,
    "title": "سولفات مس پنج‌آبه",
    "filename": "سولفات مس پنج آبه.pdf",
    "type": "default"
  },
  {
    "id": 11,
    "title": "سولفات مس",
    "filename": "سولفات مس.pdf",
    "type": "default"
  },
  {
    "id": 12,
    "title": "سیلیس",
    "filename": "سیلیس.pdf",
    "type": "default"
  },
  {
    "id": 13,
    "title": "فلوکولانت",
    "filename": "فلوکوالنت.pdf",
    "type": "default"
  },
  {
    "id": 14,
    "title": "سدیم متابی‌سولفیت",
    "filename": "متابی سولفید سدیم.pdf",
    "type": "default"
  },
  {
    "id": 15,
    "title": "هیدروکسید کلسیم (آهک هیدراته)",
    "filename": "هیدروکسید کلسیم )آهک هیدراته(.pdf",
    "type": "default"
  },
  {
    "id": 16,
    "title": "کولکتور DTC4C",
    "filename": "کولکتورDTC4C.pdf",
    "type": "default"
  },
  {
    "id": 17,
    "title": "گازوئیل",
    "filename": "گازوئیل.pdf",
    "type": "default"
  },
  {
    "id": 18,
    "title": "گریس",
    "filename": "گریس.pdf",
    "type": "default"
  }
];
    const state = {
      files: DEFAULT_SDS_FILES.map(item => ({ ...item, source: 'default' })),
      filter: ''
    };

    const el = {
      searchInput: document.getElementById('searchInput'),
      fileList: document.getElementById('fileList'),
      emptyState: document.getElementById('emptyState')
    };

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>'"]/g, function(ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#039;', '"': '&quot;' })[ch];
      });
    }

    function cleanTitle(name) {
      return String(name || '').replace(/\.pdf$/i, '').trim();
    }

    function encodePath(parts) {
      return parts.map(part => encodeURIComponent(part)).join('/');
    }

    function getDefaultUrl(file) {
      return encodePath(['files', file.filename]);
    }

    function filteredFiles() {
      const q = state.filter.trim().toLowerCase();
      if (!q) return state.files;
      return state.files.filter(file => String(file.title || file.filename || '').toLowerCase().includes(q));
    }

    function render() {
      const files = filteredFiles();
      el.fileList.innerHTML = '';
      el.emptyState.style.display = files.length ? 'none' : 'block';

      files.forEach(file => {
        const card = document.createElement('div');
        card.className = 'file-card';
        card.innerHTML = `
          <div class="file-name">📄 ${escapeHtml(file.title || cleanTitle(file.filename))}</div>
          <div class="file-actions">
            <button class="btn btn-success" data-action="open" data-id="${escapeHtml(file.id)}">👁️ باز کردن</button>
          </div>
        `;
        el.fileList.appendChild(card);
      });
    }

    function findFile(id) {
      return state.files.find(file => String(file.id) === String(id));
    }

    function openSds(file) {
      if (!file) return;
      window.open(getDefaultUrl(file), '_blank');
    }

    el.searchInput.addEventListener('input', () => {
      state.filter = el.searchInput.value || '';
      render();
    });

    el.fileList.addEventListener('click', event => {
      const btn = event.target.closest('[data-action]');
      if (!btn) return;
      const file = findFile(btn.dataset.id);
      if (btn.dataset.action === 'open') openSds(file);
    });

    document.addEventListener('DOMContentLoaded', render);
  </script>
</body>
</html>
