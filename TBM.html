// تابع تبدیل آرایه نکات به آیتم‌های قابل تیک‌زدن
// خطوطی که با ✅ 🌙 🚜 🚛 ⛏️ 🟡 🏗️ 🔥 ⚡ 🚗 🔨 🔧 🛞 📦 شروع می‌شوند، عنوان بخش هستند (بدون چک‌باکس)
// باقی خطوط، نکته‌ی قابل‌تیک‌زدن محسوب می‌شوند
function renderSafetyContent(tipsArray) {
    let html = '';
    let itemIndex = 0;
    for (let tip of tipsArray) {
        if (tip.match(/^[✅🌙🚜🚛⛏️🟡🏗️🔥⚡🚗🔨🔧🛞📦]/)) {
            html += `<h4>${tip}</h4>`;
        } else {
            html += `
                <label class="tbm-check-item" data-idx="${itemIndex}">
                    <input type="checkbox" class="tbm-chk">
                    <span class="txt">${tip}</span>
                </label>`;
            itemIndex++;
        }
    }
    return { html, total: itemIndex };
}

// ===== گرفتن اطلاعات کاربر از فعال‌سازی صفحه اصلی =====
function getActivatedUser() {
    try {
        const stored = localStorage.getItem('hse_user_activated');
        if (stored) {
            const u = JSON.parse(stored);
            if (u && u.fullname) return u;
        }
    } catch (e) {}
    return null;
}

function showTbmToast(msg, isError) {
    const t = document.getElementById('tbmToast');
    t.textContent = msg;
    t.className = 'tbm-toast show' + (isError ? ' error' : '');
    setTimeout(() => { t.className = 'tbm-toast'; }, 2800);
}

// آدرس همان Apps Script که action=tbm_check را پاسخ می‌دهد
const TBM_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxyfHXcurWL7fQLdT89Kpru-QKFayfUyz_XBEu7xUVdUB9gQ_nIWbCyZBi7lSAen81ApA/exec';

// ========== ساخت منوی TBM ==========
const safetyGrid = document.getElementById('safetyGrid');
const safetyDetail = document.getElementById('safetyDetail');
const backToMenuBtn = document.getElementById('backToMenuBtn');

for (const [key, value] of Object.entries(safetyDatabase)) {
    const card = document.createElement('div');
    card.className = 'safety-card';
    card.innerHTML = `${value.title} <span class="arrow">◀</span>`;
    card.onclick = () => openTopic(key, value);
    safetyGrid.appendChild(card);
}

function openTopic(key, value) {
    const { html, total } = renderSafetyContent(value.tips);
    const user = getActivatedUser();

    const userLine = user
        ? `👤 ${user.fullname} | پرسنلی: ${user.personnel || '—'}`
        : `⚠️ اطلاعات کاربری یافت نشد — لطفاً ابتدا از صفحه اصلی وارد شوید`;

    safetyDetail.innerHTML = `
        <div class="tbm-progress-wrap">
            <div class="tbm-progress-bar"><div class="fill" id="tbmFill"></div></div>
            <div class="tbm-progress-text" id="tbmProgressText">۰ از ${total} مورد تیک خورده</div>
        </div>
        ${html}
        <div class="tbm-submit-box">
            <div class="user-line">${userLine}</div>
            <button class="tbm-submit-btn" id="tbmSubmitBtn" disabled>✅ تکمیل و ارسال (موضوع: ${value.title})</button>
            <div class="tbm-submit-note">پس از تیک‌زدن همه موارد بالا، دکمه ارسال فعال می‌شود</div>
        </div>
    `;
    safetyDetail.style.display = 'block';
    safetyGrid.style.display = 'none';
    backToMenuBtn.style.display = 'inline-block';
    setTimeout(() => { safetyDetail.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);

    const checkboxes = safetyDetail.querySelectorAll('.tbm-chk');
    const fill = document.getElementById('tbmFill');
    const progressText = document.getElementById('tbmProgressText');
    const submitBtn = document.getElementById('tbmSubmitBtn');

    function updateProgress() {
        const checkedCount = safetyDetail.querySelectorAll('.tbm-chk:checked').length;
        const pct = total ? Math.round((checkedCount / total) * 100) : 100;
        fill.style.width = pct + '%';
        progressText.textContent = `${checkedCount} از ${total} مورد تیک خورده (${pct}%)`;
        const allChecked = checkedCount === total;
        submitBtn.disabled = !allChecked;
        submitBtn.classList.toggle('ready', allChecked);
    }

    checkboxes.forEach(cb => {
        cb.addEventListener('change', () => {
            cb.closest('.tbm-check-item').classList.toggle('checked', cb.checked);
            updateProgress();
        });
    });

    submitBtn.onclick = () => submitTBM(key, value, total, submitBtn);
}

async function submitTBM(key, value, total, btn) {
    const user = getActivatedUser();
    if (!user) {
        showTbmToast('⚠️ ابتدا از صفحه اصلی وارد شوید (نام/پرسنلی ثبت نشده)', true);
        return;
    }

    btn.disabled = true;
    btn.textContent = '⏳ در حال ارسال...';

    const params = new URLSearchParams({
        action: 'tbm_check',
        name: user.fullname || '',
        personnel: user.personnel || '',
        phone: user.phone || '',
        nationalId: user.national || '',
        topic: value.title,
        totalItems: total,
        checkedItems: total,
        datetime: new Date().toLocaleString('fa-IR')
    });

    try {
        const res = await fetch(TBM_ENDPOINT + '?' + params.toString());
        const data = await res.json();
        if (data && data.ok) {
            showTbmToast('✅ با موفقیت ثبت شد. سپاس از توجه شما به ایمنی 🛡️');
            btn.textContent = '✅ ثبت شد';
        } else {
            throw new Error(data && data.error ? data.error : 'خطای نامشخص');
        }
    } catch (err) {
        showTbmToast('❌ خطا در ارسال. اتصال اینترنت را بررسی کنید', true);
        btn.disabled = false;
        btn.textContent = `✅ تکمیل و ارسال (موضوع: ${value.title})`;
    }
}

backToMenuBtn.onclick = () => {
    safetyDetail.style.display = 'none';
    safetyGrid.style.display = 'flex';
    backToMenuBtn.style.display = 'none';
};

// ========== تنظیمات ==========
function applyTheme(theme, textColor, fontSize) {
    document.body.classList.remove('white-theme', 'black-theme', 'text-blue', 'text-green', 'text-red', 'text-purple', 'text-orange', 'text-gray');
    if (theme === 'white') document.body.classList.add('white-theme');
    if (theme === 'black') document.body.classList.add('black-theme');
    if (textColor !== 'default') document.body.classList.add(`text-${textColor}`);
    document.body.classList.remove('large-font', 'xlarge-font');
    if (fontSize === 'large') document.body.classList.add('large-font');
    if (fontSize === 'xlarge') document.body.classList.add('xlarge-font');
    localStorage.setItem('theme', theme);
    localStorage.setItem('textColor', textColor);
    localStorage.setItem('fontSize', fontSize);
}

const settingsBtn = document.getElementById('settingsBtn');
let modal = null;
settingsBtn.onclick = () => {
    if(modal) return;
    modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `
        <div class="modal-card">
            <h3>⚙️ تنظیمات</h3>
            <select id="themeSelect"><option value="white">سفید</option><option value="black">مشکی</option></select>
            <select id="textColorSelect"><option value="default">پیشفرض</option><option value="blue">آبی</option><option value="green">سبز</option><option value="red">قرمز</option><option value="purple">بنفش</option><option value="orange">نارنجی</option><option value="gray">خاکستری</option></select>
            <select id="fontSizeSelect"><option value="normal">عادی</option><option value="large">بزرگ</option><option value="xlarge">خیلی بزرگ</option></select>
            <button id="saveSettingsBtn" style="background:#2c6e4e; color:white;">ذخیره</button>
            <button id="closeModalBtn">بستن</button>
        </div>
    `;
    document.body.appendChild(modal);
    document.getElementById('themeSelect').value = localStorage.getItem('theme') || 'white';
    document.getElementById('textColorSelect').value = localStorage.getItem('textColor') || 'default';
    document.getElementById('fontSizeSelect').value = localStorage.getItem('fontSize') || 'normal';
    document.getElementById('saveSettingsBtn').onclick = () => {
        applyTheme(document.getElementById('themeSelect').value, document.getElementById('textColorSelect').value, document.getElementById('fontSizeSelect').value);
        document.body.removeChild(modal); modal = null;
    };
    document.getElementById('closeModalBtn').onclick = () => { document.body.removeChild(modal); modal = null; };
};
applyTheme(localStorage.getItem('theme') || 'white', localStorage.getItem('textColor') || 'default', localStorage.getItem('fontSize') || 'normal');
</script>
